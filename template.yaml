AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Smartsheet webhook pipeline

Resources:                                # This is the only required section in a CloudFormation template; Each entry under it is one AWS resource
  SmartsheetFunction:                     # This is the logical name of the resource; it can be anything, but should be descriptive; it is used to refer to this resource elsewhere in the template (e.g. !Ref SmartsheetFunction)
    Type: AWS::Serverless::Function       # what kind of resource
    Properties:                           # the settings for that resource
      FunctionName: smartsheet-processor
      CodeUri: .
      Handler: lambda_function.lambda_handler
      Runtime: python3.12
      Timeout: 10                         # seconds; adjusted from default 3 seconds to allow for talking to DynamoDB and S3
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref RowsTable  # Python code reads this with os.environ["DYNAMODB_TABLE"]; !Ref RowsTable resolves to the actual DynamoDB table name at deploy time; because the resource is defined in the same file, and CloudFormation knows how to link them.
          S3_BUCKET: !Ref SummaryBucket
      Policies:                           # These are SAM-specific
        - DynamoDBCrudPolicy:             # DynamoDBCrudPolicy expands into the real IAM permissions the Lambda needs to read and write DynamoDB
            TableName: !Ref RowsTable
        - S3CrudPolicy:
            BucketName: !Ref SummaryBucket
      Events:                             # how SAM creates an API Gateway resource for the Lambda
        WebhookPost:
          Type: Api
          Properties:
            Path: /webhook                # the URL path that triggers this Lambda; e.g. https://<id>.execute-api.<region>.amazonaws.com/Prod/webhook
            Method: post                  # only POST requests trigger this Lambda

  RowsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: smartsheet-rows
      BillingMode: PAY_PER_REQUEST        # Better for low-traffic projects
      AttributeDefinitions:               # Define the primary key for the table; in this case, it's just a single string attribute called "row_id"
        - AttributeName: row_id
          AttributeType: S                # S = string; other types include N for number, B for binary, etc.
      KeySchema:
        - AttributeName: row_id
          KeyType: HASH                   # HASH means this is the partition key

  SummaryBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub smartsheet-summaries-${AWS::AccountId}   # !Sub is a CloudFormation function that does string substitution. ${AWS::AccountId} is a built-in variable that resolves to my AWS account number at deploy time. S3 bucket names must be globally unique across all AWS accounts, so appending my account ID is a common way to avoid name collisions.